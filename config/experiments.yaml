# gom các nhóm thí nghiệm để so sánh encoder, label structure, loss, attention.
schema_version: 1

defaults:
  base: ABSA_targeted/config/base.yaml
  encoders: ABSA_targeted/config/encoders.yaml
  label_structures: ABSA_targeted/config/label_structures.yaml
  attention: ABSA_targeted/config/attention.yaml
  losses: ABSA_targeted/config/losses.yaml

experiment_groups:
  high_score_experiments:
    description: Small set of high-potential targeted ABSA experiments prioritized for best macro F1.
    runs:
      - name: phobert_large_gated_fusion_weighted
        purpose: Stable attention ablation; fuses CLS with learned attention pooling and keeps strong pretrained CLS signal.
        encoder_key: phobert_large
        label_structure_key: multitask_aspect_sentiment
        attention_key: cls_attention_gated_fusion
        loss_key: multitask_weighted_ce
        sample_unit: annotation

optional_later_runs:
  - name: xlm_roberta_large_target_attn_weighted
    reason: Run only if PhoBERT-large underperforms on mixed-domain data.
  - name: phobert_large_cascaded_attn_weighted
    reason: Run only after target attention is stable; cascaded attention has more random modules and often converges slower.
  - name: phobert_large_target_attn_focal
    reason: Original weighted focal gamma=2 run; keep only as a negative ablation if needed.

recommended_first_runs:
  - phobert_large_target_attn_joint_aux_ce_best
  - phobert_large_target_attn_weighted
  - phobert_large_target_attn_joint_aux
  - phobert_large_target_attn_ce
  - phobert_large_target_attn_soft_focal
