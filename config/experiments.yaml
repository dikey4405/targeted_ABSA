# gom các nhóm thí nghiệm để so sánh encoder, label structure, loss, attention.
schema_version: 1

defaults:
  base: ABSA_targeted/config/base.yaml
  encoders: ABSA_targeted/config/encoders.yaml
  label_structures: ABSA_targeted/config/label_structures.yaml
  attention: ABSA_targeted/config/attention.yaml
  losses: ABSA_targeted/config/losses.yaml

experiment_groups:
  high_score_experiments:
    description: Small set of high-potential targeted ABSA experiments prioritized for best macro F1.
    runs:
      - name: baseline_phobert_cls_multitask
        purpose: Lightweight baseline for comparison.
        encoder_key: phobert_base
        label_structure_key: multitask_aspect_sentiment
        attention_key: cls_pooling
        loss_key: multitask_ce
        sample_unit: annotation

      - name: phobert_large_cls_weighted
        purpose: Strong Vietnamese encoder with class imbalance handling.
        encoder_key: phobert_large
        label_structure_key: multitask_aspect_sentiment
        attention_key: cls_pooling
        loss_key: multitask_weighted_ce
        sample_unit: annotation

      - name: phobert_large_target_attn_weighted
        purpose: Best first candidate; combines PhoBERT-large, target-aware attention, and weighted loss.
        encoder_key: phobert_large
        label_structure_key: multitask_aspect_sentiment
        attention_key: target_conditioned_attention
        loss_key: multitask_weighted_ce
        sample_unit: annotation

      - name: phobert_large_target_attn_joint_aux
        purpose: Adds full-label supervision to improve consistency between aspect and sentiment.
        encoder_key: phobert_large
        label_structure_key: multitask_with_joint_aux
        attention_key: target_conditioned_attention
        loss_key: joint_aux_loss
        sample_unit: annotation

      - name: phobert_large_target_attn_focal
        purpose: Alternative imbalance strategy for rare aspect/sentiment classes.
        encoder_key: phobert_large
        label_structure_key: multitask_aspect_sentiment
        attention_key: target_conditioned_attention
        loss_key: focal_multitask
        sample_unit: annotation

      - name: phobert_large_cascaded_attn_weighted
        purpose: Stronger target-aware attention; useful if aspect prediction should guide sentiment prediction.
        encoder_key: phobert_large
        label_structure_key: multitask_aspect_sentiment
        attention_key: cascaded_attention
        loss_key: multitask_weighted_ce
        sample_unit: annotation

optional_later_runs:
  - name: xlm_roberta_large_target_attn_weighted
    reason: Run only if PhoBERT-large underperforms on mixed-domain data.
  - name: phobert_large_gated_fusion_weighted
    reason: Run only if target-conditioned attention beats CLS and you want one extra attention ablation.

recommended_first_runs:
  - phobert_large_target_attn_weighted
  - phobert_large_target_attn_joint_aux
  - phobert_large_target_attn_focal
